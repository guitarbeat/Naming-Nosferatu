name: PR Quality

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  title-lint:
    if: github.actor != 'dependabot[bot]' && !startsWith(github.event.pull_request.title, '🎨 Palette:')
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            test
            docs
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[a-z].+
          subjectPatternError: "Use lower-case imperative subject, e.g. 'fix(auth): handle expired token'."
          headerPattern: '^([a-z]+)(?:\(([^)]+)\))?!?: (.+)$'
          headerPatternCorrespondence: type, scope, subject

  checklist:
    runs-on: ubuntu-latest
    steps:
      - name: Comment missing PR template sections
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const requiredSections = [
              "## Summary",
              "## Validation",
              "## Rollout + Revert Plan"
            ];
            const missing = requiredSections.filter((s) => !body.includes(s));
            if (missing.length === 0) return;

            const marker = "<!-- pr-hygiene-bot -->";
            const note = `${marker}\nMissing required PR template sections:\n- ${missing.join("\n- ")}\n\nPlease fill them in to speed review and safe deployment.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: note,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: note,
              });
            }
