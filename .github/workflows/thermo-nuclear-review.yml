name: Thermo-Nuclear Code Quality Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run code quality review
        run: pnpm dlx skills add https://github.com/cursor/plugins --skill thermo-nuclear-code-quality-review -y || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
