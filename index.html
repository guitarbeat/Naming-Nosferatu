  <style>
    html {
      background-color: #050b16;
    }

    body {
      background-color: #050b16;
    }

    #deployment-error-display {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow-y: auto;
      z-index: 10000;
      background: rgba(2, 6, 23, 0.92);
      backdrop-filter: blur(12px);
    }

    #deployment-error-display .deployment-error__panel {
      width: 100%;
      max-width: 620px;
      padding: 2rem 2.25rem;
      color: #e2e8f0;
      background: #0f1929;
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(99,102,241,0.1);
      max-height: 90vh;
      overflow-y: auto;
    }

    #deployment-error-display .deployment-error__title,
    #deployment-error-display .deployment-error__message,
    #deployment-error-display .deployment-error__section-title,
    #deployment-error-display .deployment-error__list-item,
    #deployment-error-display .deployment-error__button {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      letter-spacing: normal;
      text-transform: none;
    }

    #deployment-error-display .deployment-error__icon {
      margin-bottom: 1rem;
      font-size: 2.5rem;
      line-height: 1;
      text-align: center;
    }

    #deployment-error-display .deployment-error__title {
      margin: 0 0 0.75rem;
      color: #f1f5f9;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.25;
      text-align: center;
    }

    #deployment-error-display .deployment-error__message {
      margin: 0 0 1.5rem;
      color: #94a3b8;
      font-size: 0.9375rem;
      font-weight: 400;
      line-height: 1.65;
      text-align: center;
    }

    #deployment-error-display .deployment-error__section {
      margin: 1rem 0;
      padding: 0.875rem 1rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-left: 3px solid rgba(99,102,241,0.6);
      border-radius: 8px;
    }

    #deployment-error-display .deployment-error__section-title {
      margin: 0 0 0.5rem;
      color: #cbd5e1;
      font-size: 0.8125rem;
      font-weight: 600;
      line-height: 1.4;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #deployment-error-display .deployment-error__list {
      margin: 0;
      padding-left: 1.25rem;
    }

    #deployment-error-display .deployment-error__list-item {
      margin: 0.375rem 0;
      font-size: 0.875rem;
      font-weight: 400;
      line-height: 1.55;
      color: #94a3b8;
    }

    #deployment-error-display .deployment-error__button-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1.75rem;
    }

    #deployment-error-display .deployment-error__button {
      flex: 1;
      min-width: 120px;
      padding: 0.6875rem 1.25rem;
      color: #fff;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      line-height: 1.2;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #deployment-error-display .deployment-error__button:hover {
      opacity: 0.88;
    }
  </style>
</head>

<body>
  <script>
    (function applyInitialTheme() {
      const { documentElement, body } = document;
      if (!documentElement) {
        return;
      }

      const storedTheme = localStorage.getItem("theme");
      const themePreference = ["light", "dark", "system"].includes(storedTheme)
        ? storedTheme
        : "system";
      const resolvedTheme =
        themePreference === "system"
          ? window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light"
          : themePreference;

      documentElement.dataset.theme = resolvedTheme;
      if (body) {
        body.dataset.theme = resolvedTheme;
      }
    })();
  </script>
  <div id="root"></div>
  <script>
    // * Deployment error detection - runs before React loads
    (function detectDeploymentErrors() {
      const ErrorDisplayId = "deployment-error-display";
      const MaxWaitTime = 5000; // * 5 seconds

      // * Check if root element exists
      const root = document.getElementById("root");
      if (!root) {
        showDeploymentError({
          title: "Root Element Missing",
          message:
            "The application root element (#root) was not found in the HTML.",
          suggestions: [
            'Verify index.html contains <div id="root"></div>',
            "Check that the HTML file is being served correctly",
          ],
        });
      }

      // * Monitor script loading
      const mainScript = getMainModuleScript();
      if (mainScript) {
        let scriptLoaded = root.children.length > 0;
        let scriptError = false;
        const observer = new MutationObserver(() => {
          if (root.children.length > 0) {
            clearDeploymentError();
          }
        });

        observer.observe(root, { childList: true });

        mainScript.addEventListener("load", () => {
          scriptLoaded = true;
        });

        mainScript.addEventListener("error", () => {
          scriptError = true;
          showDeploymentError({
            title: "JavaScript Failed to Load",
            message:
              "The application's JavaScript files could not be loaded. This is often caused by:",
            details: [
              "Content Security Policy (CSP) blocking scripts",
              "Incorrect build output paths",
              "Missing or incorrect base path configuration",
              "Network issues preventing script downloads",
            ],
            suggestions: [
              'Check browser console for CSP violations (look for "Content-Security-Policy" errors)',
              "Verify that script files exist in the /assets/js/ directory",
              "Check Network tab to see if scripts return 404 or are blocked",
              "Review vercel.json CSP configuration",
              "Ensure Vite build completed successfully",
            ],
          });
        });

        // * Check if app initialized after timeout
        setTimeout(() => {
          if (scriptError || root.children.length > 0) {
            observer.disconnect();
            return;
          }

          showDeploymentError({
            title: scriptLoaded ? "Something went wrong" : "Taking longer than expected",
            message: scriptLoaded
              ? "The app loaded but couldn't start up. A few things that might explain it:"
              : "The app is taking a while to download or start. Possible reasons:",
            details: scriptLoaded
              ? [
                  "A JavaScript error stopped React from mounting",
                  "A required environment variable is missing (e.g. VITE_SUPABASE_URL)",
                  "An issue in the build or app code",
                ]
              : [
                  "Slow or blocked script downloads",
                  "CDN or network hiccup",
                  "The initial bundle is still on its way",
                ],
            suggestions: scriptLoaded
              ? [
                  "Open DevTools (F12) and check the Console for errors",
                  "Make sure all required environment variables are set",
                  "Try a hard refresh (Ctrl+Shift+R / Cmd+Shift+R)",
                ]
              : [
                  "Wait a few seconds and reload",
                  "Check your network connection",
                  "Open DevTools → Network to see if the bundle is stalled",
                ],
          });
        }, MaxWaitTime);
      }

      // * Monitor CSP violations
      document.addEventListener("securitypolicyviolation", (event) => {
        if (
          event.violatedDirective === "script-src" ||
          event.effectiveDirective === "script-src"
        ) {
          showDeploymentError({
            title: "Content Security Policy Violation",
            message:
              "The application's scripts are being blocked by Content Security Policy:",
            details: [
              `Blocked resource: ${event.blockedURI || "Unknown"}`,
              `Violated directive: ${event.violatedDirective}`,
              `Current CSP: ${event.originalPolicy}`,
            ],
            suggestions: [
              "Update vercel.json CSP to allow scripts from 'self'",
              "Add 'blob:' to script-src for Vite's dynamic imports",
              "Ensure 'unsafe-inline' is included if needed",
              "Check that script sources match CSP rules",
              "Review Vercel deployment logs for CSP configuration",
            ],
          });
        }
      });

      function renderDeploymentList(title, items, listTag) {
        if (!items || items.length === 0) {
          return "";
        }

        return `
          <div class="deployment-error__section">
            <h3 class="deployment-error__section-title">${title}</h3>
            <${listTag} class="deployment-error__list">
              ${items
                .map((item) => `<li class="deployment-error__list-item">${item}</li>`)
                .join("")}
            </${listTag}>
          </div>
        `;
      }

      function clearDeploymentError() {
        const existing = document.getElementById(ErrorDisplayId);
        if (existing) {
          existing.remove();
        }
      }

      function getMainModuleScript() {
        const moduleScripts = Array.from(
          document.querySelectorAll('script[type="module"][src]'),
        );

        if (moduleScripts.length > 0) {
          return moduleScripts[moduleScripts.length - 1] || null;
        }

        return document.querySelector('script[src*="index"]');
      }

      function showDeploymentError(errorInfo) {
        // * Remove existing error display if present
        clearDeploymentError();

        const errorDiv = document.createElement("div");
        errorDiv.id = ErrorDisplayId;

        const content = document.createElement("div");
        content.className = "deployment-error__panel";

        content.innerHTML = `
            <div class="deployment-error__icon" aria-hidden="true">🐾</div>
            <h2 class="deployment-error__title">${errorInfo.title}</h2>
            <p class="deployment-error__message">${errorInfo.message}</p>
            ${renderDeploymentList("What happened", errorInfo.details, "ul")}
            ${renderDeploymentList("Try this", errorInfo.suggestions, "ol")}
            <div class="deployment-error__button-row">
              <button type="button" class="deployment-error__button" onclick="window.location.reload()">Try again</button>
            </div>
          `;

        errorDiv.appendChild(content);
        document.body.appendChild(errorDiv);
      }
    })();
  </script>
  <!-- * Entry point - Vite transforms this path during build to point to bundled assets -->
  <script type="module" src="/src/app/deployment.ts"></script>
  <script type="module" src="/src/app/main.tsx"></script>
</body>
